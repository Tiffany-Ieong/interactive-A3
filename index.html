<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./main.js" defer></script>
</head>
<body>
    <div id="book" class="book">
        <!-- Paper 1 -->
        <div id="p1" class="paper">
            <div class="front">
                <div id="f1" class="front-content">
                    <img src="IMAGES/cover.png" alt="cover">
                </div>
            </div>
            <div class="back">
                <div id="b1" class="back-content">
                    <img src="IMAGES/food-left.png" alt="page1 back">
                </div>
            </div>
        </div>
        <!-- Paper 2 -->
        <div id="p2" class="paper">
            <div class="front">
                <div id="f2" class="front-content">
                    <img src="IMAGES/food-right.png" alt="page2">
                </div>
            </div>
            <div class="back">
                <div id="b2" class="back-content">
                    <img src="IMAGES/basket.png" alt="page2 back">
                </div>
            </div>
        </div>
        <!-- Paper 3 -->
        <div id="p3" class="paper">
            <div class="front">
                <div id="f3" class="front-content">
                    <img src="IMAGES/bag.png" alt="page3">
                </div>
            </div>
            <div class="back">
                <div id="b3" class="back-content">
                    <img src="IMAGES/back.png" alt="back">
                </div>
            </div>
        </div>
    </div>

    <div class="sticker-panel">
    <div class="sticker-list">
        <img class="sticker" src="images/bug.png" alt="bug sticker">
        <img class="sticker" src="images/button.png" alt="button sticker">
        <img class="sticker" src="images/apple.png" alt="apple sticker">
        <img class="sticker" src="images/tomato.png" alt="tomato sticker">
        <img class="sticker" src="images/pizza.png" alt="pizza sticker">
        <img class="sticker" src="images/cap-green.png" alt="green sticker">
        <img class="sticker" src="images/cap-yellow.png" alt="yellow sticker">
        <img class="sticker" src="images/egg.png" alt="egg sticker">
        <img class="sticker" src="images/butter.png" alt="butter sticker">
        <img class="sticker" src="images/bread.png" alt="bread sticker">
        <img class="sticker" src="images/cheese.png" alt="cheese sticker">
        <img class="sticker" src="images/lemon.png" alt="lemon sticker">
        <img class="sticker" src="images/milk.png" alt="milk sticker">
        <img class="sticker" src="images/buttonpink.png" alt="pink sticker">
        <img class="sticker" src="images/toast.png" alt="toast sticker">
        <img class="sticker" src="images/pepe.png" alt="pepe sticker">
        <img class="sticker" src="images/mush.png" alt="mush sticker">
        <img class="sticker" src="images/eggg.png" alt="eggg sticker">
        <img class="sticker" src="images/staryellow.png" alt="yellowstar sticker">
        <img class="sticker" src="images/starblue.png" alt="bluestar sticker">
        <img class="sticker" src="images/avocado.png" alt="avocado sticker">
        <img class="sticker" src="images/fish.png" alt="fish sticker">
        <img class="sticker" src="images/ribbon.png" alt="ribbon sticker">
        <img class="sticker" src="images/pancake.png" alt="pancake sticker">
        <img class="sticker" src="images/strawberry.png" alt="strawberry sticker">
        <img class="sticker" src="images/flower.png" alt="flower sticker">
    </div>
</div>
</body>
</html>
