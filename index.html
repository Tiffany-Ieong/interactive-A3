<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./main.js" defer></script>
</head>
<body>
    <div id="book" class="book">
        <!-- Paper 1 -->
        <div id="p1" class="paper">
            <div class="front">
                <div id="f1" class="front-content">
                    <img src="IMAGES/cover.png" alt="cover">
                </div>
            </div>
            <div class="back">
                <div id="b1" class="back-content">
                    <img src="IMAGES/food-left.png" alt="page1 back">
                </div>
            </div>
        </div>
        <!-- Paper 2 -->
        <div id="p2" class="paper">
            <div class="front">
                <div id="f2" class="front-content">
                    <img src="IMAGES/food-right.png" alt="page2">
                </div>
            </div>
            <div class="back">
                <div id="b2" class="back-content">
                    <img src="IMAGES/basket.png" alt="page2 back">
                </div>
            </div>
        </div>
        <!-- Paper 3 -->
        <div id="p3" class="paper">
            <div class="front">
                <div id="f3" class="front-content">
                    <img src="IMAGES/bag.png" alt="page3">
                </div>
            </div>
            <div class="back">
                <div id="b3" class="back-content">
                    <img src="IMAGES/back.png" alt="back">
                </div>
            </div>
        </div>
    </div>

    <div class="sticker-panel">
    <p class="panel-title">stickers</p>
    <div class="sticker-list">
        <img class="sticker" src="images/bug.png" alt="bug sticker">
        <img class="sticker" src="images/button.png" alt="button sticker">
        <img class="sticker" src="images/apple.png" alt="apple sticker">
    </div>
</div>
</body>
</html>
